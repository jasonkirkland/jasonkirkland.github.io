<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Marathon Lab Results</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #0f1419;
      --surface: #1a1f26;
      --surface-2: #232a33;
      --border: #2d3640;
      --text: #e8eef5;
      --text-dim: #8a96a3;
      --accent: #4a9eff;
      --accent-dim: #2d5f99;
      --danger: #ff6b6b;
      --warn: #ffa94d;
      --ok: #51cf66;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fa;
        --surface: #ffffff;
        --surface-2: #f0f3f6;
        --border: #d8dee4;
        --text: #1a1f26;
        --text-dim: #5a6573;
        --accent: #0969da;
      }
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 8px;
    }

    .header-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }

    .icon-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      min-height: 36px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      min-height: 40px;
    }

    .btn-primary:disabled {
      opacity: 0.6;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .meta {
      font-size: 12px;
      color: var(--text-dim);
      padding: 6px 16px 0;
    }

    /* List */
    .category {
      margin-top: 16px;
    }

    .category-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding: 0 16px 6px;
    }

    .test-item {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 60px;
    }

    .test-item:active {
      background: var(--surface-2);
    }

    .test-info {
      flex: 1;
      min-width: 0;
    }

    .test-name {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .test-sub {
      font-size: 12px;
      color: var(--text-dim);
    }

    .test-value {
      text-align: right;
      flex-shrink: 0;
    }

    .value-num {
      font-size: 18px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .value-num.flag-high { color: var(--danger); }
    .value-num.flag-low { color: var(--warn); }

    .value-unit {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-dim);
    }

    .value-date {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Detail modal */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .detail-overlay.open {
      display: flex;
    }

    .detail-sheet {
      background: var(--bg);
      width: 100%;
      max-width: 720px;
      max-height: 90vh;
      border-radius: 16px 16px 0 0;
      overflow-y: auto;
      animation: slideUp 0.2s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .detail-header {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .detail-title {
      flex: 1;
      font-size: 20px;
      font-weight: 600;
    }

    .detail-category {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .close-btn {
      background: var(--surface);
      border: none;
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 18px;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .history-table th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      padding: 12px 16px 8px;
      font-weight: 600;
      background: var(--bg);
    }

    .history-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .history-table td.value-cell {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
    }

    .history-table td.value-cell.flag-high { color: var(--danger); }
    .history-table td.value-cell.flag-low { color: var(--warn); }

    .history-table td.range-cell {
      font-size: 12px;
      color: var(--text-dim);
    }

    .original-name {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Chat sheet */
    .chat-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 150;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }

    .chat-overlay.open {
      display: flex;
    }

    .chat-sheet {
      background: var(--bg);
      width: 100%;
      max-width: 720px;
      height: 92vh;
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.2s ease-out;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .chat-title {
      flex: 1;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .chat-empty {
      text-align: center;
      color: var(--text-dim);
      padding: 32px 16px;
      font-size: 14px;
    }

    .chat-empty .suggestions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .suggestion-chip:active {
      background: var(--surface-2);
    }

    .msg {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }

    .msg.user {
      align-items: flex-end;
    }

    .msg.assistant {
      align-items: flex-start;
    }

    .msg-bubble {
      max-width: 88%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-bubble strong { font-weight: 600; }
    .msg-bubble em { font-style: italic; }
    .msg-bubble code {
      background: var(--surface-2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .msg.user .msg-bubble code {
      background: rgba(255, 255, 255, 0.2);
    }
    .msg-bubble ul, .msg-bubble ol {
      margin: 6px 0;
      padding-left: 22px;
    }
    .msg-bubble li {
      margin: 2px 0;
    }
    .msg-bubble p {
      margin: 0 0 8px 0;
    }
    .msg-bubble p:last-child {
      margin-bottom: 0;
    }

    .msg-cursor {
      display: inline-block;
      width: 7px;
      height: 14px;
      background: var(--text-dim);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .chat-input-area {
      border-top: 1px solid var(--border);
      padding: 10px 12px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: var(--bg);
    }

    .chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 10px 14px;
      font-size: 16px;
      color: var(--text);
      outline: none;
      resize: none;
      max-height: 120px;
      min-height: 40px;
      font-family: inherit;
      line-height: 1.4;
    }

    .chat-input:focus {
      border-color: var(--accent);
    }

    .send-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 20px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn:disabled {
      opacity: 0.5;
    }

    .stop-btn {
      background: var(--danger);
    }

    /* Settings modal */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .settings-overlay.open {
      display: flex;
    }

    .settings-sheet {
      background: var(--bg);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      border-radius: 16px;
      overflow-y: auto;
      padding: 20px;
      border: 1px solid var(--border);
    }

    .settings-sheet h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .settings-sheet .hint {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-dim);
    }

    .field input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      color: var(--text);
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .settings-actions button {
      flex: 1;
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      min-height: 40px;
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      min-height: 40px;
    }

    /* States */
    .empty, .loading {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-dim);
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-2);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      font-size: 14px;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      max-width: 90%;
    }

    .toast.show { opacity: 1; }
    .toast.error { border-color: var(--danger); }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-row">
        <div class="title">Lab Results</div>
        <button class="icon-btn" onclick="openChat()" title="Chat with Claude">💬</button>
        <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
        <button class="btn-primary" id="fetchBtn" onclick="fetchAndRender()">Fetch</button>
      </div>
      <input
        type="search"
        class="search-input"
        id="searchInput"
        placeholder="Search tests..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      >
      <div class="actions">
        <button class="icon-btn" id="aiGroupBtn" onclick="runAIGrouping()">✨ AI Group</button>
        <button class="icon-btn" onclick="resetGrouping()">Reset Grouping</button>
      </div>
      <div class="meta" id="meta"></div>
    </div>

    <div id="content">
      <div class="empty">Tap Fetch to load your results.</div>
    </div>
  </div>

  <!-- Detail modal -->
  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-sheet" id="detailSheet" onclick="event.stopPropagation()"></div>
  </div>

  <!-- Chat sheet -->
  <div class="chat-overlay" id="chatOverlay" onclick="closeChat(event)">
    <div class="chat-sheet" onclick="event.stopPropagation()">
      <div class="chat-header">
        <div class="chat-title">Discuss with Claude</div>
        <button class="icon-btn" onclick="clearChat()" title="Clear chat">Clear</button>
        <button class="close-btn" onclick="closeChat()">×</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea
          class="chat-input"
          id="chatInput"
          rows="1"
          placeholder="Ask about your labs..."
          autocomplete="off"
          autocorrect="on"
          autocapitalize="sentences"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">↑</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-sheet">
      <h2>Settings</h2>
      <div class="hint">Stored in your browser's localStorage. Never sent anywhere except the URLs you configure here.</div>

      <div class="field">
        <label>Apps Script Proxy URL</label>
        <input type="url" id="proxyUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>

      <div class="field">
        <label>Marathon Email</label>
        <input type="email" id="marathonEmail" autocomplete="username">
      </div>

      <div class="field">
        <label>Marathon Password</label>
        <input type="password" id="marathonPassword" autocomplete="current-password">
      </div>

      <div class="field">
        <label>Dependent User ID</label>
        <input type="text" id="dependentUserId" inputmode="numeric">
      </div>

      <div class="field">
        <label>Claude API Key (sk-ant-...)</label>
        <input type="password" id="claudeApiKey">
      </div>

      <div class="settings-actions">
        <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
        <button class="btn-primary" onclick="saveSettings()">Save</button>
      </div>
      <div class="settings-actions">
        <button class="btn-danger" onclick="clearEverything()">Clear all data</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =========================================================================
    // Storage keys
    // =========================================================================
    const STORAGE_KEYS = {
      proxyUrl: 'mh_proxy_url',
      email: 'mh_email',
      password: 'mh_password',
      dependentUserId: 'mh_dependent_id',
      claudeKey: 'mh_claude_key',
      rawResults: 'mh_raw_results',
      groupings: 'mh_groupings',
      lastFetch: 'mh_last_fetch',
      chatHistory: 'mh_chat_history'
    };

    const CLAUDE_MODEL = 'claude-opus-4-6';

    // =========================================================================
    // State
    // =========================================================================
    let rawResults = null;     // full Marathon response
    let groupings = null;      // { groups: [...], analyteToGroupId: {...} } or null = use names as-is
    let searchTerm = '';

    // =========================================================================
    // Init
    // =========================================================================
    window.addEventListener('DOMContentLoaded', () => {
      // Load cached data
      try {
        const raw = localStorage.getItem(STORAGE_KEYS.rawResults);
        if (raw) rawResults = JSON.parse(raw);
        const gr = localStorage.getItem(STORAGE_KEYS.groupings);
        if (gr) groupings = JSON.parse(gr);
      } catch (e) {
        console.warn('Failed to load cached data', e);
      }

      loadChatHistory();

      // First-run: open settings if proxy URL not set
      if (!localStorage.getItem(STORAGE_KEYS.proxyUrl)) {
        openSettings();
      } else if (rawResults) {
        render();
      }

      document.getElementById('searchInput').addEventListener('input', e => {
        searchTerm = e.target.value;
        render();
      });

      // Chat input: auto-resize and Enter-to-send (Shift+Enter for newline)
      const chatInput = document.getElementById('chatInput');
      chatInput.addEventListener('input', autoResizeChatInput);
      chatInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeDetail({ target: { id: 'detailOverlay' } });
          closeChat({ target: { id: 'chatOverlay' } });
          closeSettings();
        }
      });
    });

    // =========================================================================
    // Settings
    // =========================================================================
    function openSettings() {
      document.getElementById('proxyUrl').value = localStorage.getItem(STORAGE_KEYS.proxyUrl) || '';
      document.getElementById('marathonEmail').value = localStorage.getItem(STORAGE_KEYS.email) || '';
      document.getElementById('marathonPassword').value = localStorage.getItem(STORAGE_KEYS.password) || '';
      document.getElementById('dependentUserId').value = localStorage.getItem(STORAGE_KEYS.dependentUserId) || '';
      document.getElementById('claudeApiKey').value = localStorage.getItem(STORAGE_KEYS.claudeKey) || '';
      document.getElementById('settingsOverlay').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settingsOverlay').classList.remove('open');
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEYS.proxyUrl, document.getElementById('proxyUrl').value.trim());
      localStorage.setItem(STORAGE_KEYS.email, document.getElementById('marathonEmail').value.trim());
      localStorage.setItem(STORAGE_KEYS.password, document.getElementById('marathonPassword').value);
      localStorage.setItem(STORAGE_KEYS.dependentUserId, document.getElementById('dependentUserId').value.trim());
      localStorage.setItem(STORAGE_KEYS.claudeKey, document.getElementById('claudeApiKey').value.trim());
      closeSettings();
      showToast('Settings saved');
    }

    function clearEverything() {
      if (!confirm('Clear all stored credentials and cached results?')) return;
      Object.values(STORAGE_KEYS).forEach(k => localStorage.removeItem(k));
      rawResults = null;
      groupings = null;
      chatHistory = [];
      document.getElementById('content').innerHTML =
        '<div class="empty">Cleared. Open Settings to configure.</div>';
      document.getElementById('meta').textContent = '';
      closeSettings();
      showToast('All data cleared');
    }

    function resetGrouping() {
      if (!confirm('Reset to original Marathon names? You can re-run AI grouping after.')) return;
      groupings = null;
      localStorage.removeItem(STORAGE_KEYS.groupings);
      render();
      showToast('Grouping reset');
    }

    // =========================================================================
    // Fetch from Marathon (via proxy)
    // =========================================================================
    async function fetchAndRender() {
      const proxyUrl = localStorage.getItem(STORAGE_KEYS.proxyUrl);
      const email = localStorage.getItem(STORAGE_KEYS.email);
      const password = localStorage.getItem(STORAGE_KEYS.password);
      const dependentUserId = localStorage.getItem(STORAGE_KEYS.dependentUserId);

      if (!proxyUrl || !email || !password || !dependentUserId) {
        showToast('Configure settings first', true);
        openSettings();
        return;
      }

      const btn = document.getElementById('fetchBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Fetching';

      try {
        const response = await fetch(proxyUrl, {
          method: 'POST',
          // Apps Script web apps don't accept custom Content-Type cleanly with
          // application/json from cross-origin, so we use text/plain and
          // parse JSON server-side. e.postData.contents still gets the body.
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ email, password, dependentUserId })
        });

        if (!response.ok) {
          throw new Error('Proxy HTTP ' + response.status);
        }

        const data = await response.json();
        if (data.error) {
          throw new Error(data.error);
        }

        rawResults = data.labResults;
        localStorage.setItem(STORAGE_KEYS.rawResults, JSON.stringify(rawResults));
        localStorage.setItem(STORAGE_KEYS.lastFetch, new Date().toISOString());

        render();
        showToast('Fetched ' + (rawResults?.length || 0) + ' lab groups');
      } catch (err) {
        showToast('Fetch failed: ' + err.message, true);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Fetch';
      }
    }

    // =========================================================================
    // AI Grouping (Claude direct from browser)
    // =========================================================================
    async function runAIGrouping() {
      if (!rawResults) {
        showToast('Fetch results first', true);
        return;
      }
      const claudeKey = localStorage.getItem(STORAGE_KEYS.claudeKey);
      if (!claudeKey) {
        showToast('Set Claude API key in Settings', true);
        openSettings();
        return;
      }

      const analyteNames = extractUniqueAnalyteNames(rawResults);
      if (analyteNames.length === 0) {
        showToast('No analyte names found', true);
        return;
      }

      const btn = document.getElementById('aiGroupBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Grouping';

      try {
        const result = await callClaudeForGrouping(claudeKey, analyteNames);
        groupings = result;
        localStorage.setItem(STORAGE_KEYS.groupings, JSON.stringify(groupings));
        render();
        showToast('Grouped into ' + groupings.groups.length + ' canonical tests');
      } catch (err) {
        showToast('AI grouping failed: ' + err.message, true);
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.innerHTML = '✨ AI Group';
      }
    }

    function extractUniqueAnalyteNames(results) {
      const names = new Set();
      results.forEach(group => {
        if (group.results && Array.isArray(group.results)) {
          group.results.forEach(r => {
            if (r.analyte_name) names.add(r.analyte_name);
          });
        }
      });
      return Array.from(names).sort();
    }

    async function callClaudeForGrouping(apiKey, analyteNames) {
      const prompt = buildGroupingPrompt(analyteNames);

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: CLAUDE_MODEL,
          max_tokens: 8000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error('Claude API ' + response.status + ': ' + errText);
      }

      const data = await response.json();
      const text = data.content[0].text;

      // Extract JSON object (Claude may include prose)
      const match = text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('Could not parse JSON from Claude response');
      return JSON.parse(match[0]);
    }

    function buildGroupingPrompt(analyteNames) {
      return `You are organizing medical lab test results. Lab results often come back with slightly different names for the same underlying test (e.g., "Vitamin D, 25-Hydroxy" vs "25-OH Vitamin D" vs "Vit D 25-OH"). Group analyte names that refer to the same medical test under a single canonical name.

ANALYTE NAMES TO GROUP:
${JSON.stringify(analyteNames, null, 2)}

Categories should be one of: "Lipid Panel", "Metabolic Panel", "Complete Blood Count", "Thyroid", "Pancreas", "Vitamins & Minerals", "Hormones", "Inflammation", "Liver", "Kidney", "Cardiac", "Diabetes", "Iron Studies", "Urinalysis", "Other"

USER CONTEXT — important grouping requirements:
- The user tracks pancreatic enzymes closely (amylase and lipase are usually elevated for them). Place amylase and lipase under the "Pancreas" category, not "Other" or "Metabolic Panel". If you see any other clearly pancreatic markers (e.g., trypsin, elastase), put those under "Pancreas" too.

CRITICAL RULES:
- Be conservative. Only group names if you are confident they refer to the same test.
- LDL Cholesterol Calculated vs LDL Cholesterol Direct are DIFFERENT tests.
- HDL, LDL, total cholesterol, non-HDL are all different.
- Free T4 vs Total T4 are different. Free T3 vs Total T3 are different.
- Amylase and lipase are SEPARATE tests — don't merge them into one group, but both belong in "Pancreas".
- Every analyte name in the input must appear as a key in analyteToGroupId.
- Group ids must be snake_case and unique.

Respond with ONLY a JSON object (no markdown fences, no commentary):
{
  "groups": [
    { "id": "snake_case_id", "canonicalName": "Clean Name", "category": "Category Name" }
  ],
  "analyteToGroupId": {
    "Original Analyte Name": "snake_case_id"
  }
}`;
    }

    // =========================================================================
    // Build display data from raw + groupings
    // =========================================================================
    function buildDisplayGroups() {
      if (!rawResults) return [];

      // Build per-group history
      const groupHistory = {}; // groupId -> [{date, value, ...}]
      const groupMeta = {};    // groupId -> { canonicalName, category }

      const useAI = groupings && groupings.analyteToGroupId;

      rawResults.forEach(labGroup => {
        const date = labGroup.lab_result_date;
        if (!labGroup.results) return;

        labGroup.results.forEach(result => {
          const originalName = result.analyte_name;
          if (!originalName) return;

          let groupId, canonicalName, category;

          if (useAI && groupings.analyteToGroupId[originalName]) {
            groupId = groupings.analyteToGroupId[originalName];
            const g = groupings.groups.find(gr => gr.id === groupId);
            canonicalName = g ? g.canonicalName : originalName;
            category = g ? g.category : 'Other';
          } else {
            // Default: each analyte name is its own group
            groupId = 'name:' + originalName;
            canonicalName = originalName;
            category = 'All Tests';
          }

          if (!groupHistory[groupId]) groupHistory[groupId] = [];
          if (!groupMeta[groupId]) groupMeta[groupId] = { canonicalName, category };

          groupHistory[groupId].push({
            date: date,
            value: result.value,
            unit: result.unit_of_measure || result.units || '',
            referenceRange: result.reference_range || result.normal_range || '',
            flag: result.flag || result.abnormal_flag || '',
            originalName: originalName
          });
        });
      });

      // Sort each history newest first
      Object.keys(groupHistory).forEach(id => {
        groupHistory[id].sort((a, b) => new Date(b.date) - new Date(a.date));
      });

      // Build display list
      const display = Object.keys(groupHistory).map(id => {
        const history = groupHistory[id];
        const latest = history[0];
        return {
          id: id,
          canonicalName: groupMeta[id].canonicalName,
          category: groupMeta[id].category,
          latestValue: latest ? latest.value : null,
          latestUnit: latest ? latest.unit : '',
          latestDate: latest ? latest.date : null,
          latestFlag: latest ? latest.flag : '',
          historyCount: history.length,
          history: history
        };
      });

      display.sort((a, b) => {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.canonicalName.localeCompare(b.canonicalName);
      });

      return display;
    }

    // =========================================================================
    // Render
    // =========================================================================
    function render() {
      const meta = document.getElementById('meta');
      const lastFetch = localStorage.getItem(STORAGE_KEYS.lastFetch);
      const parts = [];
      if (lastFetch) parts.push('Last fetch: ' + formatDateTime(lastFetch));
      if (groupings) parts.push('AI grouped (' + groupings.groups.length + ')');
      else if (rawResults) parts.push('Raw names');
      meta.textContent = parts.join(' · ');

      const content = document.getElementById('content');

      if (!rawResults) {
        content.innerHTML = '<div class="empty">Tap Fetch to load your results.</div>';
        return;
      }

      const allGroups = buildDisplayGroups();
      const term = searchTerm.toLowerCase().trim();

      const filtered = term
        ? allGroups.filter(g => {
            if (g.canonicalName.toLowerCase().includes(term)) return true;
            if (g.category.toLowerCase().includes(term)) return true;
            return g.history.some(h =>
              (h.originalName || '').toLowerCase().includes(term));
          })
        : allGroups;

      if (filtered.length === 0) {
        content.innerHTML = '<div class="empty">No tests match "' +
          escapeHtml(searchTerm) + '"</div>';
        return;
      }

      // Group by category
      const byCategory = {};
      filtered.forEach(g => {
        if (!byCategory[g.category]) byCategory[g.category] = [];
        byCategory[g.category].push(g);
      });

      let html = '';
      Object.keys(byCategory).sort().forEach(category => {
        html += '<div class="category">';
        html += '<div class="category-label">' + escapeHtml(category) + '</div>';
        byCategory[category].forEach(g => {
          html += renderListItem(g);
        });
        html += '</div>';
      });

      content.innerHTML = html;
    }

    function renderListItem(g) {
      const flagClass = flagToClass(g.latestFlag);
      const value = (g.latestValue !== null && g.latestValue !== undefined && g.latestValue !== '')
        ? g.latestValue : '—';
      const unit = g.latestUnit ? ' ' + g.latestUnit : '';
      const sub = g.historyCount + ' result' + (g.historyCount === 1 ? '' : 's');

      return '<div class="test-item" onclick="showDetail(\'' + escapeAttr(g.id) + '\')">' +
        '<div class="test-info">' +
          '<div class="test-name">' + escapeHtml(g.canonicalName) + '</div>' +
          '<div class="test-sub">' + sub + '</div>' +
        '</div>' +
        '<div class="test-value">' +
          '<div class="value-num ' + flagClass + '">' +
            escapeHtml(value) +
            '<span class="value-unit">' + escapeHtml(unit) + '</span></div>' +
          '<div class="value-date">' + formatDate(g.latestDate) + '</div>' +
        '</div>' +
      '</div>';
    }

    // =========================================================================
    // Detail
    // =========================================================================
    function showDetail(groupId) {
      const allGroups = buildDisplayGroups();
      const group = allGroups.find(g => g.id === groupId);
      if (!group) return;

      let html = '<div class="detail-header">' +
        '<div>' +
          '<div class="detail-title">' + escapeHtml(group.canonicalName) + '</div>' +
          '<div class="detail-category">' + escapeHtml(group.category) + '</div>' +
        '</div>' +
        '<button class="close-btn" onclick="closeDetail()">×</button>' +
      '</div>';

      html += '<table class="history-table">' +
        '<thead><tr><th>Date</th><th>Value</th><th>Range</th></tr></thead>' +
        '<tbody>';

      group.history.forEach(h => {
        const flagClass = flagToClass(h.flag);
        const showOriginal = h.originalName !== group.canonicalName;
        html += '<tr>' +
          '<td>' + formatDate(h.date) + '</td>' +
          '<td class="value-cell ' + flagClass + '">' +
            escapeHtml(h.value || '—') +
            (h.unit ? ' <span class="value-unit">' + escapeHtml(h.unit) + '</span>' : '') +
            (showOriginal ? '<div class="original-name">as: ' +
              escapeHtml(h.originalName) + '</div>' : '') +
          '</td>' +
          '<td class="range-cell">' + escapeHtml(h.referenceRange || '—') + '</td>' +
        '</tr>';
      });

      html += '</tbody></table>';

      document.getElementById('detailSheet').innerHTML = html;
      document.getElementById('detailOverlay').classList.add('open');
    }

    function closeDetail(event) {
      if (event && event.target && event.target.id !== 'detailOverlay') return;
      document.getElementById('detailOverlay').classList.remove('open');
    }

    // =========================================================================
    // Chat with Claude
    // =========================================================================
    let chatHistory = [];      // [{role: 'user'|'assistant', content: string}, ...]
    let chatStreaming = false; // is a response currently streaming?
    let chatAbortController = null;

    function loadChatHistory() {
      try {
        const stored = localStorage.getItem(STORAGE_KEYS.chatHistory);
        if (stored) chatHistory = JSON.parse(stored);
      } catch (e) {
        chatHistory = [];
      }
    }

    function saveChatHistory() {
      try {
        localStorage.setItem(STORAGE_KEYS.chatHistory, JSON.stringify(chatHistory));
      } catch (e) {
        console.warn('Failed to save chat history', e);
      }
    }

    function openChat() {
      if (!localStorage.getItem(STORAGE_KEYS.claudeKey)) {
        showToast('Set Claude API key in Settings', true);
        openSettings();
        return;
      }
      document.getElementById('chatOverlay').classList.add('open');
      renderChat();
      // Focus input after animation
      setTimeout(() => {
        const messages = document.getElementById('chatMessages');
        messages.scrollTop = messages.scrollHeight;
      }, 250);
    }

    function closeChat(event) {
      if (event && event.target && event.target.id !== 'chatOverlay') return;
      document.getElementById('chatOverlay').classList.remove('open');
      // If a stream is in flight, let it continue — closing just hides UI
    }

    function clearChat() {
      if (chatHistory.length === 0) return;
      if (!confirm('Clear chat history?')) return;
      chatHistory = [];
      saveChatHistory();
      renderChat();
    }

    function renderChat() {
      const container = document.getElementById('chatMessages');

      if (chatHistory.length === 0) {
        const hasData = !!rawResults;
        container.innerHTML =
          '<div class="chat-empty">' +
            (hasData
              ? 'Ask me anything about your lab results.'
              : 'Fetch your lab results first, then ask me about them.') +
            (hasData ? '<div class="suggestions">' +
              '<button class="suggestion-chip" onclick="useSuggestion(this)">' +
                'How are my pancreatic enzymes trending?</button>' +
              '<button class="suggestion-chip" onclick="useSuggestion(this)">' +
                'Which results are out of range right now?</button>' +
              '<button class="suggestion-chip" onclick="useSuggestion(this)">' +
                'Summarize my last lab visit.</button>' +
              '<button class="suggestion-chip" onclick="useSuggestion(this)">' +
                'What tests have changed the most over time?</button>' +
            '</div>' : '') +
          '</div>';
        return;
      }

      container.innerHTML = '';
      chatHistory.forEach(m => {
        container.appendChild(renderMessageElement(m.role, m.content, false));
      });
      container.scrollTop = container.scrollHeight;
    }

    function renderMessageElement(role, content, withCursor) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = renderMarkdown(content) + (withCursor ? '<span class="msg-cursor"></span>' : '');
      div.appendChild(bubble);
      return div;
    }

    function useSuggestion(btn) {
      const input = document.getElementById('chatInput');
      input.value = btn.textContent.trim();
      input.focus();
      autoResizeChatInput();
    }

    /**
     * Build a compact summary of all lab data for the system prompt.
     * Sends canonical name (post-grouping if available) plus recent values.
     */
    function buildLabContextForChat() {
      if (!rawResults) return 'No lab data has been fetched yet.';

      const allGroups = buildDisplayGroups();
      if (allGroups.length === 0) return 'No lab results available.';

      // Sort by category, then name
      const lines = [];
      lines.push('Patient lab data summary (most recent values listed first per test):');
      lines.push('');

      const byCategory = {};
      allGroups.forEach(g => {
        if (!byCategory[g.category]) byCategory[g.category] = [];
        byCategory[g.category].push(g);
      });

      Object.keys(byCategory).sort().forEach(category => {
        lines.push('## ' + category);
        byCategory[category].forEach(g => {
          // Up to 8 most recent values per test
          const history = g.history.slice(0, 8);
          const points = history.map(h => {
            let p = formatDate(h.date) + ': ' + (h.value || '?');
            if (h.unit) p += ' ' + h.unit;
            if (h.flag) p += ' [' + h.flag + ']';
            if (h.referenceRange) p += ' (ref: ' + h.referenceRange + ')';
            return p;
          });
          lines.push('- ' + g.canonicalName + ' — ' + points.join('; '));
        });
        lines.push('');
      });

      return lines.join('\n');
    }

    function buildSystemPrompt() {
      const today = new Date().toISOString().split('T')[0];
      return `You are a helpful assistant discussing lab test results with the patient. Today is ${today}.

${buildLabContextForChat()}

Guidelines:
- Be direct and concrete. The patient is sophisticated and wants real analysis, not hedge-everything responses.
- Reference specific values, dates, and trends from the data above.
- When discussing trends, mention direction (up/down), magnitude, and timeframe.
- If asked about "normal" or "out of range," use the reference ranges shown.
- Acknowledge that you're not a doctor and serious concerns should go to their physician — but only when genuinely warranted, not as boilerplate.
- Use markdown formatting (bold, lists) where it improves readability. Keep responses focused and not overly long unless detail is requested.
- The patient's pancreatic enzymes (amylase, lipase) are typically elevated and they track these closely.`;
    }

    async function sendMessage() {
      if (chatStreaming) return; // already streaming

      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      const apiKey = localStorage.getItem(STORAGE_KEYS.claudeKey);
      if (!apiKey) {
        showToast('Set Claude API key in Settings', true);
        return;
      }

      // Add user message
      chatHistory.push({ role: 'user', content: text });
      saveChatHistory();
      input.value = '';
      autoResizeChatInput();

      // Render user message immediately
      const messagesEl = document.getElementById('chatMessages');
      // Clear the empty state if present
      if (chatHistory.length === 1) {
        messagesEl.innerHTML = '';
      }
      messagesEl.appendChild(renderMessageElement('user', text, false));

      // Add streaming assistant placeholder
      const assistantEl = renderMessageElement('assistant', '', true);
      const assistantBubble = assistantEl.querySelector('.msg-bubble');
      messagesEl.appendChild(assistantEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Update send button to stop button
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.textContent = '■';
      sendBtn.classList.add('stop-btn');
      sendBtn.onclick = stopStreaming;
      chatStreaming = true;

      let assistantText = '';

      try {
        chatAbortController = new AbortController();

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: CLAUDE_MODEL,
            max_tokens: 4000,
            stream: true,
            system: buildSystemPrompt(),
            messages: chatHistory.map(m => ({ role: m.role, content: m.content }))
          }),
          signal: chatAbortController.signal
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error('API ' + response.status + ': ' + errText);
        }

        // Parse SSE stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || ''; // keep incomplete line for next chunk

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (!data) continue;

            try {
              const event = JSON.parse(data);
              if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
                assistantText += event.delta.text;
                assistantBubble.innerHTML = renderMarkdown(assistantText) +
                  '<span class="msg-cursor"></span>';
                messagesEl.scrollTop = messagesEl.scrollHeight;
              } else if (event.type === 'message_stop') {
                // done
              } else if (event.type === 'error') {
                throw new Error('Stream error: ' + JSON.stringify(event.error));
              }
            } catch (parseErr) {
              // Ignore parse errors on individual events; stream may have noise
              console.warn('SSE parse error', parseErr, data);
            }
          }
        }

        // Finalize
        assistantBubble.innerHTML = renderMarkdown(assistantText);
        if (assistantText.trim()) {
          chatHistory.push({ role: 'assistant', content: assistantText });
          saveChatHistory();
        } else {
          // Empty response — remove the placeholder
          assistantEl.remove();
        }

      } catch (err) {
        if (err.name === 'AbortError') {
          // User stopped
          if (assistantText.trim()) {
            assistantBubble.innerHTML = renderMarkdown(assistantText) +
              '<div style="color:var(--text-dim);font-size:12px;margin-top:6px">[stopped]</div>';
            chatHistory.push({ role: 'assistant', content: assistantText });
            saveChatHistory();
          } else {
            assistantEl.remove();
          }
        } else {
          assistantBubble.innerHTML =
            '<div style="color:var(--danger)">Error: ' + escapeHtml(err.message) + '</div>';
          // Remove the user message so they can retry — actually keep it,
          // user can decide. Don't save assistant error as history.
        }
      } finally {
        chatStreaming = false;
        chatAbortController = null;
        sendBtn.textContent = '↑';
        sendBtn.classList.remove('stop-btn');
        sendBtn.onclick = sendMessage;
      }
    }

    function stopStreaming() {
      if (chatAbortController) {
        chatAbortController.abort();
      }
    }

    /**
     * Tiny markdown renderer: bold, italic, inline code, lists, paragraphs.
     * Not full markdown — just enough for chat readability.
     */
    function renderMarkdown(text) {
      if (!text) return '';

      // Escape HTML first
      let html = escapeHtml(text);

      // Inline code (do before bold/italic so we don't process inside)
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Bold: **text** or __text__
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');

      // Italic: *text* or _text_  (after bold)
      html = html.replace(/(^|[\s])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      html = html.replace(/(^|[\s])_([^_\n]+)_/g, '$1<em>$2</em>');

      // Lists: lines starting with - or * or numbered
      const lines = html.split('\n');
      let out = [];
      let listType = null; // 'ul' or 'ol' or null
      let para = [];

      const flushPara = () => {
        if (para.length) {
          out.push('<p>' + para.join(' ') + '</p>');
          para = [];
        }
      };
      const closeList = () => {
        if (listType) {
          out.push('</' + listType + '>');
          listType = null;
        }
      };

      lines.forEach(line => {
        const trimmed = line.trim();
        const ulMatch = trimmed.match(/^[-*]\s+(.+)/);
        const olMatch = trimmed.match(/^\d+\.\s+(.+)/);

        if (ulMatch) {
          flushPara();
          if (listType !== 'ul') { closeList(); out.push('<ul>'); listType = 'ul'; }
          out.push('<li>' + ulMatch[1] + '</li>');
        } else if (olMatch) {
          flushPara();
          if (listType !== 'ol') { closeList(); out.push('<ol>'); listType = 'ol'; }
          out.push('<li>' + olMatch[1] + '</li>');
        } else if (trimmed === '') {
          flushPara();
          closeList();
        } else {
          closeList();
          para.push(trimmed);
        }
      });
      flushPara();
      closeList();

      return out.join('');
    }

    function autoResizeChatInput() {
      const input = document.getElementById('chatInput');
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }

    // =========================================================================
    // Helpers
    // =========================================================================
    function flagToClass(flag) {
      if (!flag) return '';
      const f = String(flag).toUpperCase();
      if (f.includes('H') || f.includes('HIGH') || f.includes('ABNORMAL')) return 'flag-high';
      if (f.includes('L') || f.includes('LOW')) return 'flag-low';
      return '';
    }

    function formatDate(d) {
      if (!d) return '';
      const date = new Date(d);
      if (isNaN(date)) return d;
      return date.toLocaleDateString(undefined, {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function formatDateTime(d) {
      if (!d) return '';
      const date = new Date(d);
      if (isNaN(date)) return d;
      return date.toLocaleString(undefined, {
        month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit'
      });
    }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function escapeAttr(s) {
      return escapeHtml(s);
    }

    function showToast(msg, isError) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show' + (isError ? ' error' : '');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => {
        toast.className = 'toast' + (isError ? ' error' : '');
      }, 2500);
    }
  </script>
</body>
</html>
