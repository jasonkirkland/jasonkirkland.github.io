<!DOCTYPE html>
<html>
  <head>
    <title>Radar</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1,user-scalable=no" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/radar/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/radar/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/radar/favicon-16x16.png">
    <link rel="manifest" href="/icons/radar/site.webmanifest">
    <link rel="mask-icon" href="/icons/radar/safari-pinned-tab.svg" color="#5bbad5">
    <link rel="shortcut icon" href="/icons/radar/favicon.ico">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="msapplication-config" content="/icons/radar/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Product+Sans:400,400i,700,700i" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Product+Sans:400,400i,700,700i" rel="stylesheet" type="text/css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vuetify/2.3.13/vuetify.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.14/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vuetify/2.3.13/vuetify.min.js"></script>

    <style type="text/css">
    html,body{background-color:black; height:100%; width:100%;padding:0;margin:0;}
      [v-cloak] {
        display: none;
      }
      .radar-card {
        height: 100%;
      }
      .radar-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%; /* 16:9 */
        overflow: hidden;
        cursor: pointer;
        background: #333;
      }
      .radar-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .radar-next {
        opacity: 0;
        transition: opacity 0.6s ease-in-out;
      }
      .radar-next--visible {
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div id="app" v-cloak>
      <v-app class="grey">
        <v-app-bar hide-on-scroll class="blue darken-2 white--text" app>
          <v-toolbar-title style="width: 300px" class="ml-0 pl-4"> Radar</v-toolbar-title>
        </v-app-bar>

        <v-main class="grey pl-4 pr-4">
          <v-container fluid>
            <v-row>
              <v-col v-for="(image, key) in radar" :key="key" cols="12" md="4">
                <v-card class="radar-card">
                  <div class="radar-wrapper" @click="openImageInNewTab(image.currentUrl)">
                    <img :src="image.currentUrl" class="radar-img">
                    <img
                      v-if="image.nextUrl"
                      :src="image.nextUrl"
                      class="radar-img radar-next"
                      :class="{ 'radar-next--visible': image.transitioning }"
                    >
                  </div>
                  <v-card-title class="title">{{ image.name }}</v-card-title>
                </v-card>
              </v-col>
            </v-row>
          </v-container>
        </v-main>

        <v-footer fixed class="grey font-weight-medium">
          <v-col class="text-center" cols="12">
            <a href="https://wfaa.com/weather" target="_blank">WFAA</a>
          </v-col>
        </v-footer>

        <!--Extra spacing to allow overflow scrolling on mobile-->
        <br />
        <br />
      </v-app>
    </div>

    <script>
      new Vue({
        el: "#app",
        vuetify: new Vuetify(),
        data: () => ({
          radar: {
            northtexas: {
              name: "North Texas",
              baseUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/new_dma.gif",
              currentUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/new_dma.gif?123",
              nextUrl: null,
              transitioning: false
            },
            metroplex: {
              name: "Metroplex",
              baseUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/new_metro.gif",
              currentUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/new_metro.gif?123",
              nextUrl: null,
              transitioning: false
            },
            usa: {
              name: "USA",
              baseUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/usa_anim.gif",
              currentUrl: "https://cdn.tegna-media.com/wfaa/weather/animated-loops/comp/temp_880x495/usa_anim.gif?123",
              nextUrl: null,
              transitioning: false
            }
          },
        }),
        mounted: function () {
          setInterval(this.refreshRadarImages, 32 * 1000);
        },
        methods: {
          refreshRadarImages: function () {
            const timestamp = new Date().toISOString().replaceAll("-", "").replaceAll(":", "").replaceAll(".", "");
            Object.keys(this.radar).forEach((key) => {
              const item = this.radar[key];
              if (item.transitioning) return;

              const newUrl = item.baseUrl + '?' + timestamp;
              const img = new Image();
              img.onload = () => {
                item.nextUrl = newUrl;
                this.$nextTick(() => {
                  item.transitioning = true;
                  setTimeout(() => {
                    item.currentUrl = newUrl;
                    item.transitioning = false;
                    item.nextUrl = null;
                  }, 700);
                });
              };
              img.src = newUrl;
            });
          },
          openImageInNewTab: function (imageUrl) {
            window.open(imageUrl, '_blank');
          }
        },
      });
    </script>
  </body>
</html>
